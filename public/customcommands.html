<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FernieID — Настройка команд</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08020f;--text:#f0f0ff;--muted:rgba(255,255,255,0.35);
  --p1:#b48dff;--p2:#7eb8ff;--p3:#ff9ed2;--radius:20px;
  --red:#ff6b6b;--teal:#4ecdc4;--orange:#ffb87a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;background:radial-gradient(1200px 600px at 15% -10%,rgba(167,139,250,0.12),transparent 60%),radial-gradient(900px 500px at 110% 30%,rgba(129,140,248,0.1),transparent 60%);}
.orbs::before{
  content:'';position:absolute;inset:-60% -20%;
  background-image:linear-gradient(rgba(180,141,255,0.07) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(180,141,255,0.07) 1px,transparent 1px);
  background-size:52px 52px;
  transform:perspective(700px) rotateX(58deg);
  animation:gridMove 16s linear infinite;
}
@keyframes gridMove{from{background-position:0 0,0 0;}to{background-position:0 52px,52px 0;}}
.cube3d{position:absolute;top:14%;right:8%;width:180px;height:180px;transform-style:preserve-3d;animation:cubeSpin 18s linear infinite;opacity:.35;pointer-events:none;}
.cube3d .face{position:absolute;width:180px;height:180px;border:1px solid rgba(180,141,255,0.4);background:rgba(180,141,255,0.03);}
.cube3d .f1{transform:translateZ(90px);}
.cube3d .f2{transform:rotateY(90deg) translateZ(90px);}
.cube3d .f3{transform:rotateY(180deg) translateZ(90px);}
.cube3d .f4{transform:rotateY(-90deg) translateZ(90px);}
.cube3d .f5{transform:rotateX(90deg) translateZ(90px);}
.cube3d .f6{transform:rotateX(-90deg) translateZ(90px);}
@keyframes cubeSpin{from{transform:rotateX(-20deg) rotateY(0deg);}to{transform:rotateX(-20deg) rotateY(360deg);}}
@media(max-width:720px){.cube3d{display:none;}}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18;}
.orb1{width:520px;height:520px;background:var(--p1);top:-200px;left:-140px;animation:drift 22s ease-in-out infinite alternate;}
.orb2{width:440px;height:440px;background:var(--p2);top:30%;right:-150px;animation:drift 22s ease-in-out infinite alternate -8s;}
.orb3{width:400px;height:400px;background:var(--p3);bottom:-140px;left:30%;animation:drift 22s ease-in-out infinite alternate -15s;}
@keyframes drift{0%{transform:translate(0,0);}50%{transform:translate(30px,-40px);}100%{transform:translate(-20px,25px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.page{position:relative;z-index:2;min-height:100vh;display:none;}
.page.active{display:block;animation:fadeUp .35s ease both;}

/* ═══ AUTH ═══ */
#auth-page.active{display:flex;justify-content:center;align-items:center;flex-direction:column;padding:1.5rem;}
.auth-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-.5px;color:var(--p1);text-shadow:0 0 28px rgba(180,141,255,0.5);margin-bottom:2rem;display:flex;align-items:center;gap:10px;}
.auth-logo-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));box-shadow:0 0 14px var(--p1);animation:pulse 2.5s ease infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--p1);transform:scale(1);}50%{box-shadow:0 0 22px var(--p1);transform:scale(1.3);}}
.auth-card{width:100%;max-width:400px;background:rgba(20,15,32,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(180,141,255,0.15);border-radius:24px;padding:2rem;box-shadow:0 24px 64px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.07);position:relative;}
.auth-card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(180,141,255,0.5) 40%,rgba(255,255,255,0.8) 50%,rgba(180,141,255,0.5) 60%,transparent);}
.input-label{font-size:.7rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.gl-input{width:100%;padding:12px 15px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:11px;outline:none;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text);transition:border-color .2s,background .2s;margin-bottom:.9rem;}
.gl-input::placeholder{color:rgba(255,255,255,0.22);}
.gl-input:focus{border-color:rgba(180,141,255,0.5);background:rgba(180,141,255,0.07);box-shadow:0 0 0 3px rgba(180,141,255,0.1);}
.gl-btn{width:100%;padding:13px;border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:all .2s;}
.gl-btn-primary{background:linear-gradient(135deg,rgba(180,141,255,0.3),rgba(126,184,255,0.22));border:1px solid rgba(180,141,255,0.4);color:rgba(255,255,255,.95);box-shadow:0 6px 22px rgba(180,141,255,0.18);}
.gl-btn-primary:active{transform:scale(0.98);}
.msg{font-size:.79rem;min-height:16px;margin-top:.4rem;text-align:center;}

/* ═══ MAIN ═══ */
#main-page{padding-bottom:6rem;}
.topbar{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,3rem);background:rgba(8,2,15,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(180,141,255,0.12);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:8px;}
.topbar-logo-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));box-shadow:0 0 10px var(--p1);animation:pulse 2.5s ease infinite;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--muted);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.72rem;color:#fff;}
.logout-btn{font-size:.72rem;font-weight:500;color:var(--muted);padding:6px 12px;border-radius:100px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);transition:all .2s;}
.logout-btn:hover{color:var(--red);border-color:rgba(255,107,107,0.3);}

.container{max-width:960px;margin:0 auto;padding:2.5rem clamp(1rem,4vw,2rem) 2rem;}
.hero{margin-bottom:2rem;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:.67rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:5px 13px;border-radius:100px;margin-bottom:.85rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 7px var(--teal);}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-1px;line-height:1.15;margin-bottom:.5rem;}
.hero h1 .grad{background:linear-gradient(135deg,var(--p1),var(--p2) 50%,var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--muted);font-size:.88rem;line-height:1.7;max-width:560px;}

.tg-banner{display:flex;align-items:center;gap:12px;padding:.9rem 1.2rem;border-radius:14px;margin-bottom:1.75rem;}
.tg-banner.ok{background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2);}
.tg-banner.bad{background:rgba(255,184,122,0.08);border:1px solid rgba(255,184,122,0.22);}
.tg-banner-ico{font-size:1.3rem;flex-shrink:0;}
.tg-banner-text{flex:1;font-size:.8rem;color:rgba(255,255,255,.8);line-height:1.5;}
.tg-banner-text b{color:var(--text);}

.section-label{font-size:.65rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin:2rem 0 1rem;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.1),transparent);}
.section-label:first-child{margin-top:0;}

.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:720px){.cmd-grid{grid-template-columns:1fr;}}

.cmd-card{border-radius:18px;padding:1.35rem;background:rgba(20,15,32,0.65);border:1px solid rgba(255,255,255,0.08);box-shadow:0 4px 20px rgba(0,0,0,0.38);position:relative;overflow:hidden;transition:border-color .25s,transform .25s;}
.cmd-card:hover{transform:translateY(-2px);border-color:rgba(180,141,255,0.22);}
.cmd-card::before{content:'';position:absolute;top:0;left:6%;right:6%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28) 35%,rgba(255,255,255,0.5) 50%,rgba(255,255,255,0.28) 65%,transparent);}
.cmd-card-top{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.cmd-ico{width:42px;height:42px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:rgba(180,141,255,0.14);border:1px solid rgba(180,141,255,0.24);}
.cmd-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;margin-bottom:.15rem;}
.cmd-default{font-size:.68rem;color:var(--muted);}
.cmd-default code{background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:5px;color:var(--p2);font-family:monospace;}

.alias-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem;min-height:20px;}
.alias-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 8px 5px 12px;border-radius:100px;background:rgba(180,141,255,0.1);border:1px solid rgba(180,141,255,0.22);font-family:monospace;font-size:.75rem;color:#d8c8ff;}
.alias-chip button{background:none;border:none;cursor:pointer;color:rgba(255,107,107,0.7);font-size:.85rem;line-height:1;padding:0 2px;transition:color .18s;}
.alias-chip button:hover{color:var(--red);}
.alias-empty{font-size:.7rem;color:rgba(255,255,255,0.2);font-style:italic;}

.alias-add-row{display:flex;gap:.5rem;}
.alias-input{flex:1;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:9px;outline:none;font-family:monospace;font-size:.78rem;color:var(--text);transition:border-color .2s;}
.alias-input::placeholder{color:rgba(255,255,255,0.2);font-family:'Inter',sans-serif;}
.alias-input:focus{border-color:rgba(180,141,255,0.4);}
.alias-add-btn{padding:8px 14px;border-radius:9px;background:rgba(78,205,196,0.12);border:1px solid rgba(78,205,196,0.25);color:var(--teal);font-family:'Inter',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .18s;flex-shrink:0;}
.alias-add-btn:hover{background:rgba(78,205,196,0.2);}

.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;justify-content:center;padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));pointer-events:none;}
.save-bar-inner{pointer-events:all;display:flex;align-items:center;gap:1rem;background:rgba(14,8,24,0.97);border:1px solid rgba(180,141,255,0.22);border-radius:18px;padding:.85rem 1.25rem;box-shadow:0 -8px 40px rgba(0,0,0,0.5),0 10px 40px rgba(0,0,0,0.4);backdrop-filter:blur(20px);max-width:560px;width:100%;}
.save-status{flex:1;font-size:.75rem;color:var(--muted);}
.save-btn{padding:10px 22px;border-radius:11px;background:linear-gradient(135deg,rgba(180,141,255,0.3),rgba(126,184,255,0.22));border:1px solid rgba(180,141,255,0.42);color:#fff;font-family:'Inter',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.save-btn:hover{box-shadow:0 6px 20px rgba(180,141,255,0.25);}
.save-btn:disabled{opacity:.5;cursor:default;}
.reset-btn{padding:10px 16px;border-radius:11px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.25);color:var(--red);font-family:'Inter',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.reset-btn:hover{background:rgba(255,107,107,0.18);}
.reset-btn:disabled{opacity:.5;cursor:default;}

.spinner{width:26px;height:26px;border-radius:50%;border:2px solid rgba(180,141,255,0.14);border-top-color:var(--p1);animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══ CSS icon set (replaces emoji) ═══ */
.ci{position:relative;display:inline-block;width:1em;height:1em;vertical-align:middle;}
.ci::before,.ci::after{content:'';position:absolute;}

/* hero-dot / topbar-logo-dot stay as-is (already CSS) */

/* generic small icons used inline (banner, toast, save, tfa) */
.ci-ok{width:16px;height:16px;}
.ci-ok::before{left:2px;top:8px;width:5px;height:2px;background:var(--teal);transform:rotate(45deg);border-radius:1px;}
.ci-ok::after{left:5px;top:6px;width:9px;height:2px;background:var(--teal);transform:rotate(-45deg);border-radius:1px;}

.ci-warn{width:16px;height:16px;border-radius:50%;border:2px solid var(--orange);}
.ci-warn::before{left:6.5px;top:2.5px;width:2px;height:6px;background:var(--orange);border-radius:1px;}
.ci-warn::after{left:6.5px;top:10.5px;width:2px;height:2px;background:var(--orange);border-radius:50%;}

.ci-save{width:15px;height:15px;border:2px solid #fff;border-radius:3px;}
.ci-save::before{left:2.5px;top:-2px;width:6px;height:4px;background:var(--bg);border:2px solid #fff;border-top:none;border-radius:0 0 2px 2px;}

.ci-lock{width:14px;height:14px;}
.ci-lock::before{left:2px;top:6px;width:10px;height:8px;background:var(--p1);border-radius:2px;}
.ci-lock::after{left:4px;top:0;width:6px;height:8px;border:2px solid var(--p1);border-bottom:none;border-radius:5px 5px 0 0;}

.ci-x{width:14px;height:14px;}
.ci-x::before{left:1px;top:6px;width:12px;height:2px;background:currentColor;transform:rotate(45deg);border-radius:1px;}
.ci-x::after{left:1px;top:6px;width:12px;height:2px;background:currentColor;transform:rotate(-45deg);border-radius:1px;}

.ci-plus{width:14px;height:14px;}
.ci-plus::before{left:6px;top:1px;width:2px;height:12px;background:currentColor;border-radius:1px;}
.ci-plus::after{left:1px;top:6px;width:12px;height:2px;background:currentColor;border-radius:1px;}

/* command icons: one class per action_key, geometric marks instead of emoji */
.cmd-ico{position:relative;overflow:hidden;}
.cmd-ico>span{position:relative;display:block;width:20px;height:20px;}
.cmd-ico>span::before,.cmd-ico>span::after{content:'';position:absolute;background:var(--p1);}

.ico-profile>span::before{left:6px;top:0;width:8px;height:8px;border-radius:50%;}
.ico-profile>span::after{left:2px;top:10px;width:16px;height:8px;border-radius:8px 8px 0 0;}

.ico-balance>span::before{left:9px;top:0;width:2px;height:20px;}
.ico-balance>span::after{left:4px;top:5px;width:12px;height:10px;border-radius:6px;background:transparent;border:2px solid var(--p1);}

.ico-help>span::before{left:6px;top:0;width:8px;height:8px;border-radius:50% 50% 50% 0;transform:rotate(45deg);}
.ico-help>span::after{left:8.5px;top:15px;width:3px;height:3px;border-radius:50%;}

.ico-top>span::before{left:5px;top:0;width:10px;height:10px;border-radius:0 0 8px 8px;}
.ico-top>span::after{left:8px;top:10px;width:4px;height:9px;}

.ico-seeds>span::before{left:6px;top:2px;width:8px;height:12px;border-radius:0 100% 0 100%;}

.ico-dc>span::before{left:4px;top:6px;width:12px;height:8px;clip-path:polygon(50% 0,100% 30%,80% 100%,20% 100%,0 30%);}

.ico-market>span::before{left:3px;top:2px;width:14px;height:6px;border-radius:2px 2px 0 0;}
.ico-market>span::after{left:3px;top:8px;width:14px;height:10px;border-radius:0 0 2px 2px;background:transparent;border:2px solid var(--p1);border-top:none;}

.ico-inventory>span::before{left:2px;top:4px;width:16px;height:12px;border-radius:2px;background:transparent;border:2px solid var(--p1);}
.ico-inventory>span::after{left:7px;top:0;width:6px;height:6px;border-radius:0 0 6px 6px;background:transparent;border:2px solid var(--p1);border-top:none;}

.ico-cases>span::before{left:3px;top:3px;width:14px;height:14px;border-radius:2px;background:transparent;border:2px solid var(--p1);}
.ico-cases>span::after{left:3px;top:9px;width:14px;height:2px;}

.ico-packs>span::before{left:3px;top:2px;width:10px;height:14px;border-radius:2px;background:transparent;border:2px solid var(--p1);transform:rotate(-8deg);}
.ico-packs>span::after{left:7px;top:4px;width:10px;height:14px;border-radius:2px;background:transparent;border:2px solid var(--p2);transform:rotate(8deg);}

.ico-craft>span::before{left:2px;top:2px;width:16px;height:16px;background:transparent;border:2px solid var(--p1);transform:rotate(45deg);}

.ico-cards>span::before{left:2px;top:5px;width:16px;height:11px;border-radius:2px;background:transparent;border:2px solid var(--p1);}
.ico-cards>span::after{left:5px;top:2px;width:16px;height:11px;border-radius:2px;background:var(--bg);border:2px solid var(--p2);}

.ico-minecraft>span::before{left:2px;top:2px;width:16px;height:16px;clip-path:polygon(0 0,60% 0,60% 40%,100% 40%,100% 100%,40% 100%,40% 60%,0 60%);}

.ico-transfer>span::before{left:0;top:4px;width:14px;height:2px;}
.ico-transfer>span::after{left:10px;top:1px;width:8px;height:8px;border-radius:50%;background:transparent;border:2px solid var(--p1);border-left:none;border-bottom:none;transform:rotate(45deg);}

.ico-ferniex_id>span::before{left:5px;top:8px;width:10px;height:8px;border-radius:2px;}
.ico-ferniex_id>span::after{left:7px;top:2px;width:6px;height:8px;border:2px solid var(--p1);border-bottom:none;border-radius:5px 5px 0 0;background:transparent;}
.state-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:.7rem;color:var(--muted);font-size:.82rem;}

.tfa-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:1rem;}
.tfa-modal{width:100%;max-width:360px;background:rgba(14,8,28,0.99);border:1px solid rgba(180,141,255,0.2);border-radius:20px;padding:1.75rem;box-shadow:0 36px 72px rgba(0,0,0,0.8);position:relative;}
.tfa-modal::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(180,141,255,0.6) 40%,rgba(255,255,255,0.9) 50%,rgba(180,141,255,0.6) 60%,transparent);}
.tfa-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.5rem;text-align:center;}
.tfa-sub{font-size:.78rem;color:rgba(255,255,255,.4);text-align:center;margin-bottom:1.25rem;line-height:1.6;}
.tfa-code-input{width:100%;text-align:center;letter-spacing:8px;font-size:1.3rem;font-weight:600;margin-bottom:.75rem;}
#toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(20,15,32,0.96);border:1px solid rgba(180,141,255,0.3);color:#fff;padding:10px 20px;border-radius:12px;font-size:.8rem;font-weight:500;z-index:9999;transition:opacity .3s;white-space:nowrap;backdrop-filter:blur(12px);opacity:0;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="orbs">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <div class="cube3d">
    <div class="face f1"></div><div class="face f2"></div><div class="face f3"></div>
    <div class="face f4"></div><div class="face f5"></div><div class="face f6"></div>
  </div>
</div>

<!-- AUTH -->
<div id="auth-page" class="page active">
  <div class="auth-logo"><div class="auth-logo-dot"></div>FernieID</div>
  <div class="auth-card">
    <div style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:1.25rem;">Вход в настройки команд</div>
    <label class="input-label">Логин</label>
    <input class="gl-input" id="loginUsername" placeholder="Введите логин" autocomplete="username">
    <label class="input-label">Пароль</label>
    <input class="gl-input" id="loginPassword" type="password" placeholder="Введите пароль" autocomplete="current-password">
    <button class="gl-btn gl-btn-primary" id="loginSubmit">Войти →</button>
    <div class="msg" id="loginMsg" style="color:var(--red)"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-page" class="page">
  <div class="topbar">
    <div class="topbar-logo"><div class="topbar-logo-dot"></div>FernieID · Команды</div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topAvatar">F</div>
      <span id="topName">fernie</span>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
  </div>

  <div class="container">
    <div class="hero">
      <div class="hero-tag"><div class="hero-dot"></div>Персональные алиасы</div>
      <h1>Настрой команды <span class="grad">под себя</span></h1>
      <p>Добавь свои варианты команд бота — например <code style="background:rgba(255,255,255,.06);padding:2px 6px;border-radius:5px;color:var(--p2);">/я</code> вместо <code style="background:rgba(255,255,255,.06);padding:2px 6px;border-radius:5px;color:var(--p2);">/profile</code>. Настройки применяются только к твоему аккаунту.</p>
    </div>

    <div id="tgBanner"></div>
    <div id="cmdContent"><div class="state-loading"><div class="spinner"></div><span>Загрузка команд...</span></div></div>
  </div>

  <div class="save-bar">
    <div class="save-bar-inner">
      <div class="save-status" id="saveStatus">Изменения не сохранены</div>
      <button class="reset-btn" id="resetBtn">Сбросить</button>
      <button class="save-btn" id="saveBtn"><span class="ci ci-save" style="margin-right:6px"></span>Сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://ferniex-id.vercel.app';
const $ = id => document.getElementById(id);

// ══════════════════════════════════════════════════════════════
// Дефолтный набор команд. action_key должен совпадать с тем,
// что диспетчер команд бота использует для резолва алиасов.
// Добавляй свои по аналогии — остальное подтянется автоматически.
// ══════════════════════════════════════════════════════════════
const ACTION_DEFS = [
  { key:'profile',   name:'Профиль',        icon:'ico-profile',   def:'/я',        group:'Основное' },
  { key:'balance',   name:'Баланс',         icon:'ico-balance',   def:'/баланс',   group:'Основное' },
  { key:'help',      name:'Помощь',         icon:'ico-help',      def:'/help',     group:'Основное' },
  { key:'top',       name:'Топ игроков',    icon:'ico-top',       def:'топ',      group:'Основное' },
  { key:'dc',        name:'DC-баланс',      icon:'ico-dc',        def:'/dc',       group:'Экономика' },
  { key:'shop',      name:'Магазин',        icon:'ico-market',    def:'магаз',   group:'Экономика' },
  { key:'cases',     name:'Кейсы',          icon:'ico-cases',     def:'кейсы',    group:'Экономика' },
  { key:'cards',     name:'Мои карточки',   icon:'ico-cards',     def:'карты',    group:'Коллекция' },
  { key:'ferniex_id',name:'FernieID',       icon:'ico-ferniex_id',def:'/id',       group:'Аккаунт' },
  { key:'bug_report',name:'Сообщить о ошибке',icon:'ico-bug',       def:'/баг',      group:'Поддержка' },
];

let currentUser = null;
let userConfig = {};       // { action_key: [alias1, alias2, ...] }
let dirty = false;

// ── Авторизация (переиспользуем логику FernieID) ─────────────
$('loginSubmit').onclick = async () => {
  const u = $('loginUsername').value.trim(), p = $('loginPassword').value, msg = $('loginMsg');
  if (!u || !p) { msg.textContent = 'Введи логин и пароль'; return; }
  msg.style.color = 'var(--muted)'; msg.textContent = 'Проверяем...';
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: 'fid_48919a000140bf6b7e7767281ffc31329647d6a5c133fe8f', username: u, password: p })
    });
    const data = await res.json();
    if (!data.success) { msg.style.color = 'var(--red)'; msg.textContent = data.error || 'Ошибка входа'; return; }
    if (data.require2fa) {
      msg.style.color = 'var(--muted)'; msg.textContent = 'Код отправлен в Telegram';
      show2FAModal(data.userId);
      return;
    }
    currentUser = { id: data.userId, username: data.username, role: data.role };
    localStorage.setItem('cc_session', JSON.stringify(currentUser));
    openMain();
  } catch (e) { msg.style.color = 'var(--red)'; msg.textContent = 'Ошибка сети'; }
};

// ── Модалка ввода 2FA-кода из Telegram ───────────────────────
function show2FAModal(userId){
  const overlay = document.createElement('div');
  overlay.className = 'tfa-overlay';
  overlay.innerHTML = `
    <div class="tfa-modal">
      <div class="tfa-title"><span class="ci ci-lock" style="margin-right:6px"></span>Двухфакторная авторизация</div>
      <div class="tfa-sub">Код отправлен в Telegram. Введи его ниже.</div>
      <input id="tfaCode" class="gl-input tfa-code-input" placeholder="000000" maxlength="6" inputmode="numeric">
      <div class="msg" id="tfaMsg" style="color:var(--red);text-align:center;margin-bottom:.75rem;"></div>
      <button id="tfaBtn" class="gl-btn gl-btn-primary">Подтвердить →</button>
      <button id="tfaCancelBtn" style="width:100%;padding:10px;margin-top:.6rem;background:none;border:1px solid rgba(255,255,255,0.08);border-radius:11px;color:var(--muted);font-family:'Inter',sans-serif;font-size:.78rem;cursor:pointer;">Отмена</button>
    </div>`;
  document.body.appendChild(overlay);
  const inp = overlay.querySelector('#tfaCode'), msg = overlay.querySelector('#tfaMsg'), btn = overlay.querySelector('#tfaBtn');
  setTimeout(() => inp?.focus(), 100);

  async function doVerify(){
    const code = inp.value.trim();
    if (!code) { msg.textContent = 'Введи код'; return; }
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px"></span>Проверка...'; btn.style.opacity = '0.6'; btn.style.pointerEvents = 'none';
    try {
      const res = await fetch(`${API}/api/auth/verify-2fa`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey: 'fid_48919a000140bf6b7e7767281ffc31329647d6a5c133fe8f', userId, code })
      });
      const d = await res.json();
      if (d.success) {
        overlay.remove();
        currentUser = { id: d.userId, username: d.username, role: d.role };
        localStorage.setItem('cc_session', JSON.stringify(currentUser));
        openMain();
      } else {
        msg.textContent = d.error || 'Неверный код';
        btn.textContent = 'Подтвердить →'; btn.style.opacity = ''; btn.style.pointerEvents = '';
      }
    } catch(e) {
      msg.textContent = 'Ошибка сети';
      btn.textContent = 'Подтвердить →'; btn.style.opacity = ''; btn.style.pointerEvents = '';
    }
  }
  btn.addEventListener('click', doVerify);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doVerify(); });
  overlay.querySelector('#tfaCancelBtn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}
$('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginSubmit').click(); });

$('logoutBtn').onclick = () => {
  localStorage.removeItem('cc_session');
  currentUser = null;
  $('main-page').classList.remove('active');
  $('auth-page').classList.add('active');
};

(function autoLogin(){
  try {
    const saved = JSON.parse(localStorage.getItem('cc_session'));
    if (saved?.id) { currentUser = saved; openMain(); }
  } catch {}
})();

async function openMain(){
  $('auth-page').classList.remove('active');
  $('main-page').classList.add('active');
  const init = (currentUser.username || 'U')[0].toUpperCase();
  $('topAvatar').textContent = init; $('topName').textContent = currentUser.username;
  await loadConfig();
}

// ── Загрузка текущего конфига пользователя ───────────────────
// Ожидаемый бэкенд-эндпоинт (нужно добавить в server.js / бота):
//   GET  {API}/api/customcommands/:telegramId   -> { success, telegram_id, config: { action_key: [alias,...] } }
//   POST {API}/api/customcommands/save          -> { telegram_id, config } -> { success }
// Бот при старте/по вебхуку читает этот config из Supabase и матчит
// входящие сообщения: если text совпадает с одним из aliases для telegram_id,
// то маршрутизирует в обработчик action_key наравне с дефолтной командой.
async function loadConfig(){
  const cont = $('cmdContent');
  const bannerEl = $('tgBanner');
  cont.innerHTML = '<div class="state-loading"><div class="spinner"></div><span>Загрузка команд...</span></div>';
  try {
    const infoRes = await fetch(`${API}/api/bank-info?userId=${currentUser.id}`).then(r=>r.json()).catch(()=>({success:false}));
    const tgLinked = !!infoRes.telegram_linked;
    const telegramId = infoRes.telegram_id;

    if (!tgLinked) {
      bannerEl.innerHTML = `<div class="tg-banner bad"><span class="tg-banner-ico">⚠️</span><div class="tg-banner-text">Telegram не привязан. Привяжи аккаунт в разделе <b>Безопасность</b> на FernieID, чтобы настроить персональные команды бота.</div></div>`;
      cont.innerHTML = '<div class="state-loading"><span>Недоступно без привязки Telegram</span></div>';
      $('saveBtn').disabled = true;
      return;
    }
    bannerEl.innerHTML = `<div class="tg-banner ok"><span class="tg-banner-ico ci ci-ok"></span><div class="tg-banner-text">Telegram привязан · ID: <b>${telegramId}</b>. Настройки применяются только к твоему аккаунту в боте.</div></div>`;
    let cfg = {};
    try {
      const r = await fetch(`${API}/api/customcommands/${telegramId}`).then(r=>r.json());
      if (r.success && r.config) cfg = r.config;
    } catch(e) { /* эндпоинт ещё не добавлен на бэкенде — работаем с пустым конфигом */ }

    userConfig = cfg;
    renderCommands();
  } catch(e) {
    cont.innerHTML = '<div class="state-loading"><span>⚠️ Ошибка загрузки</span></div>';
  }
}

function renderCommands(){
  const cont = $('cmdContent');
  const groups = {};
  ACTION_DEFS.forEach(a => { (groups[a.group] = groups[a.group] || []).push(a); });

  let html = '';
  Object.entries(groups).forEach(([groupName, actions]) => {
    html += `<div class="section-label">${groupName}</div><div class="cmd-grid">`;
    actions.forEach(a => {
      const aliases = userConfig[a.key] || [];
      html += `
        <div class="cmd-card" data-key="${a.key}">
          <div class="cmd-card-top">
            <div class="cmd-ico ${a.icon}"><span></span></div>
            <div>
              <div class="cmd-name">${a.name}</div>
              <div class="cmd-default">По умолчанию: <code>${a.def}</code></div>
            </div>
          </div>
          <div class="alias-chips" id="chips-${a.key}">
            ${aliases.length ? aliases.map((al,i)=>`<span class="alias-chip">${escapeHtml(al)}<button onclick="removeAlias('${a.key}',${i})"><span class="ci ci-x"></span></button></span>`).join('')
              : '<span class="alias-empty">Персональных алиасов пока нет</span>'}
          </div>
          <div class="alias-add-row">
            <input class="alias-input" id="input-${a.key}" placeholder="/моякоманда" maxlength="32">
            <button class="alias-add-btn" onclick="addAlias('${a.key}')"><span class="ci ci-plus" style="margin-right:5px"></span>Добавить</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  cont.innerHTML = html;

  cont.querySelectorAll('.alias-input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addAlias(inp.id.replace('input-','')); });
  });
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function normalizeAlias(raw){
  let v = raw.trim().toLowerCase();
  if (!v) return null;
  if (!v.startsWith('/')) v = '/' + v;
  v = v.replace(/\s+/g, '');
  if (v.length < 2 || v.length > 32) return null;
  return v;
}

window.addAlias = function(key){
  const inp = $('input-'+key);
  const val = normalizeAlias(inp.value);
  if (!val) { showToast('Введи корректную команду, например /я'); return; }
  userConfig[key] = userConfig[key] || [];
  if (userConfig[key].includes(val)) { showToast('Такой алиас уже добавлен'); return; }
  userConfig[key].push(val);
  inp.value = '';
  dirty = true;
  updateSaveStatus();
  renderCommands();
};

window.removeAlias = function(key, idx){
  if (!userConfig[key]) return;
  userConfig[key].splice(idx, 1);
  if (!userConfig[key].length) delete userConfig[key];
  dirty = true;
  updateSaveStatus();
  renderCommands();
};

function updateSaveStatus(){
  $('saveStatus').textContent = dirty ? 'Есть несохранённые изменения' : 'Все изменения сохранены';
  $('saveStatus').style.color = dirty ? 'var(--orange)' : 'var(--muted)';
}

$('resetBtn').onclick = () => {
  if (!Object.keys(userConfig).length) { showToast('Уже пусто'); return; }
  if (!confirm('Сбросить все алиасы? Команды вернутся к стандартным. Изменение применится только после нажатия «Сохранить».')) return;
  userConfig = {};
  dirty = true;
  updateSaveStatus();
  renderCommands();
  showToast('Алиасы сброшены — не забудь сохранить');
};

$('saveBtn').onclick = async () => {
  const btn = $('saveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px"></span>Сохраняем...';
  try {
    const infoRes = await fetch(`${API}/api/bank-info?userId=${currentUser.id}`).then(r=>r.json());
    const telegramId = infoRes.telegram_id;
    const r = await fetch(`${API}/api/customcommands/save`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: telegramId, userId: currentUser.id, config: userConfig })
    }).then(r=>r.json()).catch(()=>({success:false,error:'Эндпоинт ещё не подключен на бэкенде'}));
    if (r.success) { showToast('Команды сохранены'); dirty = false; updateSaveStatus(); }
    else showToast(r.error || 'Ошибка сохранения');
  } catch(e) { showToast('Ошибка сети'); }
  btn.disabled = false; btn.innerHTML = '<span class="ci ci-save" style="margin-right:6px"></span>Сохранить';
};

function showToast(msg){
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
